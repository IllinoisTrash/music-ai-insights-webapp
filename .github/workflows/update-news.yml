name: Daily News Update

on:
  schedule:
    # 每天上午8点运行 (UTC时间 00:00，北京时间 8:00)
    - cron: '0 0 * * *'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual update'

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd server
          npm ci
      
      - name: Fetch latest news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cd server
          node services/autoNewsFetcher.js
        continue-on-error: true
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain server/data/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📰 News data has been updated"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No new news to update"
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add server/data/
          git commit -m "📰 Auto-update news data - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
      
      - name: Trigger Vercel redeploy
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "🚀 Triggering Vercel redeploy..."
          # Vercel会自动检测GitHub推送并重新部署
          echo "✅ Vercel will automatically redeploy"
      
      - name: Summary
        run: |
          echo "## 📰 Daily News Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ News data updated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Changes:**" >> $GITHUB_STEP_SUMMARY
            git diff --stat server/data/ >> $GITHUB_STEP_SUMMARY || true
          else
            echo "ℹ️ No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Update time:** $(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
