services:
  - type: web
    name: music-ai-insights-api
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: UPDATE_SCHEDULE
        value: 0 8 * * *
      - key: CORS_ORIGINS
        value: https://musicainsight.netlify.app,http://localhost:5173
    healthCheckPath: /api/health
    autoDeploy: true
